<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details</title>
  <link rel="stylesheet" href="../../index.css">
  <style>
    body {
      background: radial-gradient(1200px 800px at 10% 10%, #071028 0%, #0f1724 40%);
      color: #e6eef8;
      padding: 40px 20px;
      overflow-y: auto;
    }

    .project-container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(11, 18, 32, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px;
    }

    .nav-buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e6eef8;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }

    .nav-btn:hover {
      background: rgba(110, 231, 183, 0.1);
      border-color: rgba(110, 231, 183, 0.3);
      color: #6ee7b7;
    }

    h1 {
      color: #e9fbf4;
      font-size: 36px;
      margin: 0 0 20px 0;
      text-align: center;
    }

    .project-meta {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
    }

    .meta-item {
      text-align: center;
    }

    .meta-label {
      font-size: 12px;
      text-transform: uppercase;
      color: #98a8bf;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 5px;
    }

    .meta-value {
      color: #6ee7b7;
      font-weight: 600;
      font-size: 14px;
    }

    .description {
      color: #c9d7e8;
      line-height: 1.8;
      margin: 30px 0;
      text-align: center;
      font-size: 16px;
    }

    .content-section {
      margin: 40px 0;
    }

    .section-title {
      color: #e9fbf4;
      font-size: 22px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(110, 231, 183, 0.3);
    }

    /* Gallery & Image Section */
    .gallery-container {
      margin: 40px 0;
    }

    .main-image-wrapper {
      position: relative;
      margin-bottom: 20px;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.35);
      aspect-ratio: 16 / 9;
      height: min(70vh, 520px);
    }

    .main-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.25);
      transition: transform 0.18s ease;
      will-change: transform;
    }

    .image-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-nav-btn:hover {
      background: rgba(110, 231, 183, 0.4);
    }

    .image-nav-btn.prev {
      left: 15px;
    }

    .image-nav-btn.next {
      right: 15px;
    }

    .image-counter {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #6ee7b7;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 5;
    }

    .thumbnail-gallery,
    .thumbnail {
      display:none !important;
    }

    /* Video Section */
    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      margin: 30px 0;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }

    /* Features */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 15px;
      color: #c9d7e8;
    }

    .feature-card strong {
      color: #6ee7b7;
      display: block;
      margin-bottom: 8px;
    }

    /* Technical Details */
    .tech-breakdown {
      background: rgba(0, 0, 0, 0.3);
      border-left: 3px solid #6ee7b7;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }

    .tech-item {
      margin-bottom: 15px;
    }

    .tech-item strong {
      color: #6ee7b7;
      display: block;
      margin-bottom: 5px;
    }

    .tech-item p {
      color: #c9d7e8;
      margin: 0;
      font-size: 14px;
    }

    /* Tech Stack */
    .tech-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    .tech-badge {
      background: rgba(110, 231, 183, 0.1);
      border: 1px solid rgba(110, 231, 183, 0.3);
      color: #6ee7b7;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin: 30px 0;
      justify-content: center;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, rgba(110, 231, 183, 0.1), rgba(110, 231, 183, 0.05));
      border: 1px solid rgba(110, 231, 183, 0.3);
      border-radius: 8px;
      color: #6ee7b7;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      font-weight: 600;
    }

    .action-btn:hover {
      background: linear-gradient(135deg, rgba(110, 231, 183, 0.2), rgba(110, 231, 183, 0.1));
      border-color: #6ee7b7;
      box-shadow: 0 0 20px rgba(110, 231, 183, 0.2);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Custom Cursor */
    .use-custom-cursor {
      cursor: none;
    }
    .use-custom-cursor * {
      cursor: none;
    }

    .custom-cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 28px;
      height: 28px;
      border: 1.5px solid rgba(110, 231, 183, 0.75);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10000;
      transition: transform 0.12s ease, opacity 0.12s ease, border-color 0.12s ease;
    }

    .custom-cursor-dot {
      position: fixed;
      left: 0;
      top: 0;
      width: 6px;
      height: 6px;
      background: rgba(110, 231, 183, 0.95);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10001;
    }

    .custom-cursor.is-active {
      transform: translate(-50%, -50%) scale(1.3);
    }

    .custom-cursor.is-hidden,
    .custom-cursor-dot.is-hidden {
      opacity: 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .project-container {
        padding: 25px;
      }

      h1 {
        font-size: 28px;
      }

      .project-meta {
        flex-direction: column;
        gap: 10px;
      }

      .features-grid {
        grid-template-columns: 1fr;
      }

      .nav-buttons {
        flex-direction: column;
      }

      .nav-btn {
        width: 100%;
        text-align: center;
      }

      .action-buttons {
        flex-direction: column;
      }

      .action-btn {
        width: 100%;
        justify-content: center;
      }

      .thumbnail-gallery {
        padding-bottom: 6px;
      }

      .thumbnail {
        width: 96px;
        height: 58px;
      }

      .main-image-wrapper {
        height: min(50vh, 320px);
      }
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #98a8bf;
    }

    .error {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.3);
      color: #ff6b6b;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="project-container" id="content">
    <div class="loading">Loading project details...</div>
  </div>

  <script>
    let currentImageIndex = 0;
    let projectData = null;

    function getYouTubeEmbedUrl(url) {
      if (!url) return null;
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null;
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`Failed to load ${url}: ${res.status}`);
      }
      const text = await res.text();
      const clean = text.replace(/^\uFEFF/, '');
      return JSON.parse(clean);
    }

    async function loadProject() {
      try {
        // Get project ID from URL path or query
        const params = new URLSearchParams(window.location.search);
        const queryId = params.get('id');
        const pathParts = window.location.pathname.split('/');
        const pathId = pathParts[pathParts.length - 2];
        const projectId = queryId || pathId;

        if (!projectId) {
          throw new Error('Project ID not found');
        }

        // Fetch project data
        const [projectsData, detailsData] = await Promise.all([
          fetchJson('../../data/projects.json'),
          fetchJson('../../data/project-details.json')
        ]);

        const project = projectsData.projects.find(p => p.id === projectId);
        if (!project) {
          throw new Error('Project not found');
        }

        const detailAliases = {
          "rewind": "rewind-system",
          "prototype-for-rpg-game": "prototype-rpg",
          "indra-vs-virtasure": "legend-of-indra",
          "quest-of-cybertron": "isles-of-echoes"
        };

        // Merge project details
        const detailsKey = detailAliases[projectId] || projectId;
        const details = detailsData.projectDetails[detailsKey] || {};
        projectData = { ...project, ...details };

        renderProject();
      } catch (err) {
        console.error('Error loading project:', err);
        document.getElementById('content').innerHTML = `
          <div class="error">
            <h2>Error Loading Project</h2>
            <p>${err.message}</p>
            <a href="../../index.html" class="nav-btn">? Back to Showcase</a>
          </div>
        `;
      }
    }

    function setupCursor(){
      if (window.matchMedia('(hover: none)').matches) return;
      document.body.classList.add('use-custom-cursor');

      const cursor = document.createElement('div');
      cursor.className = 'custom-cursor';
      const dot = document.createElement('div');
      dot.className = 'custom-cursor-dot';
      document.body.appendChild(cursor);
      document.body.appendChild(dot);

      let x = 0;
      let y = 0;
      let cx = 0;
      let cy = 0;

      function render(){
        cx += (x - cx) * 0.2;
        cy += (y - cy) * 0.2;
        cursor.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
        dot.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
        requestAnimationFrame(render);
      }

      document.addEventListener('mousemove', (e)=>{
        x = e.clientX;
        y = e.clientY;
      });

      document.addEventListener('mouseleave', ()=>{
        cursor.classList.add('is-hidden');
        dot.classList.add('is-hidden');
      });

      document.addEventListener('mouseenter', ()=>{
        cursor.classList.remove('is-hidden');
        dot.classList.remove('is-hidden');
      });

      document.addEventListener('mousedown', ()=> cursor.classList.add('is-active'));
      document.addEventListener('mouseup', ()=> cursor.classList.remove('is-active'));

      render();
    }

    function setupImageParallax(){
      if (window.matchMedia('(hover: none)').matches) return;
      const wrapper = document.querySelector('.main-image-wrapper');
      const image = document.getElementById('mainImage');
      if (!wrapper || !image) return;

      wrapper.addEventListener('mousemove', (e)=>{
        const rect = wrapper.getBoundingClientRect();
        const nx = (e.clientX - rect.left) / rect.width - 0.5;
        const ny = (e.clientY - rect.top) / rect.height - 0.5;
        const moveX = (nx * 10).toFixed(2);
        const moveY = (ny * 10).toFixed(2);
        image.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.02)`;
      });

      wrapper.addEventListener('mouseleave', ()=>{
        image.style.transform = 'translate(0, 0) scale(1)';
      });
    }

    function renderProject() {
      let images = projectData.images || [];
      if (!images.length && projectData.image) {
        images = [projectData.image];
      }
      const techStack = projectData.techStack || [];
      const keyFeatures = projectData.keyFeatures || [];
      const techBreakdown = projectData.technicalBreakdown || {};

      let html = `
        <div class="nav-buttons">
          <a href="../../index.html" class="nav-btn">? Back to Showcase</a>
          <button class="nav-btn" onclick="navigatePrevious()">? Previous Project</button>
          <button class="nav-btn" onclick="navigateNext()">Next Project ?</button>
        </div>

        <h1>${projectData.title}</h1>

        <div class="project-meta">
          <div class="meta-item">
            <span class="meta-label">Engine</span>
            <span class="meta-value">${projectData.engine || 'N/A'}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Type</span>
            <span class="meta-value">${projectData.type || 'Game'}</span>
          </div>
          ${projectData.tags ? `
            <div class="meta-item">
              <span class="meta-label">Tags</span>
              <span class="meta-value">${projectData.tags.join(', ')}</span>
            </div>
          ` : ''}
        </div>

        <div class="description">
          <p>${projectData.description || projectData.hook || ''}</p>
        </div>

        ${projectData.technicalOverview ? `
          <div class="content-section">
            <div class="section-title">Technical Overview</div>
            <p style="color: #c9d7e8; line-height: 1.8;">${projectData.technicalOverview}</p>
          </div>
        ` : ''}
      `;

      // Images Section
      if (images.length > 0) {
        html += `
          <div class="gallery-container content-section">
            <div class="section-title">Gallery</div>
            <div class="main-image-wrapper">
              <img id="mainImage" class="main-image" src="../../${images[0]}" alt="${projectData.title}">
              ${images.length > 1 ? `
                <button class="image-nav-btn prev" onclick="previousImage()">?</button>
                <button class="image-nav-btn next" onclick="nextImage()">?</button>
                <div class="image-counter"><span id="imageCounter">1</span> / ${images.length}</div>
              ` : ''}
            </div>
          </div>
        `;
      }

      // Video Section
      if (projectData.video) {
        const embedUrl = getYouTubeEmbedUrl(projectData.video);
        if (embedUrl) {
          html += `
            <div class="content-section">
              <div class="section-title">Video Preview</div>
              <div class="video-container">
                <iframe src="${embedUrl}" allowfullscreen></iframe>
              </div>
            </div>
          `;
        }
      }

      // Key Features
      if (keyFeatures.length > 0) {
        html += `
          <div class="content-section">
            <div class="section-title">Key Features</div>
            <div class="features-grid">
              ${keyFeatures.map(feature => `
                <div class="feature-card">
                  <strong>?</strong>
                  ${feature}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Tech Stack
      if (techStack.length > 0) {
        html += `
          <div class="content-section">
            <div class="section-title">Tech Stack</div>
            <div class="tech-stack">
              ${techStack.map(tech => `<span class="tech-badge">${tech}</span>`).join('')}
            </div>
          </div>
        `;
      }

      // Technical Breakdown
      if (Object.keys(techBreakdown).length > 0) {
        html += `
          <div class="content-section">
            <div class="section-title">Technical Breakdown</div>
            <div class="tech-breakdown">
              ${Object.entries(techBreakdown).map(([key, value]) => `
                <div class="tech-item">
                  <strong>${key.charAt(0).toUpperCase() + key.slice(1)}</strong>
                  <p>${value}</p>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Action Buttons
      const links = { ...(projectData.links || {}) };
      if (projectData.source) links.source = projectData.source;

      if (Object.keys(links).length > 0 || projectData.download) {
        html += `
          <div class="action-buttons">
            ${projectData.download ? `<a href="${projectData.download}" target="_blank" class="action-btn">?? Download</a>` : ''}
            ${links.source ? `<a href="${links.source}" target="_blank" class="action-btn">?? Source Code</a>` : ''}
            ${Object.entries(links)
              .filter(([key]) => !['demo', 'source'].includes(key.toLowerCase()))
              .map(([key, url]) => `<a href="${url}" target="_blank" class="action-btn">${key} ?</a>`)
              .join('')}
          </div>
        `;
      }

      document.getElementById('content').innerHTML = html;
      window.mappedImages = images;
      setupImageParallax();
    }

    function setMainImage(index) {
      if (!window.mappedImages || window.mappedImages.length === 0) return;
      currentImageIndex = index;
      const imageEl = document.getElementById('mainImage');
      imageEl.src = `../../${window.mappedImages[currentImageIndex]}`;
      imageEl.style.transform = 'translate(0, 0) scale(1)';
      document.getElementById('imageCounter').textContent = currentImageIndex + 1;
    }

    function previousImage() {
      if (!window.mappedImages || window.mappedImages.length === 0) return;
      currentImageIndex = (currentImageIndex - 1 + window.mappedImages.length) % window.mappedImages.length;
      setMainImage(currentImageIndex);
    }

    function nextImage() {
      if (!window.mappedImages || window.mappedImages.length === 0) return;
      currentImageIndex = (currentImageIndex + 1) % window.mappedImages.length;
      setMainImage(currentImageIndex);
    }

    function getCurrentProjectId() {
      const params = new URLSearchParams(window.location.search);
      const queryId = params.get('id');
      if (queryId) return queryId;
      const parts = window.location.pathname.split('/');
      return parts[parts.length - 2];
    }

    function navigatePrevious() {
      // Get all project IDs from data
      fetchJson('../../data/projects.json')
        .then(data => {
          const projects = data.projects;
          const currentId = getCurrentProjectId();
          const currentIndex = projects.findIndex(p => p.id === currentId);
          if (currentIndex > 0) {
            window.location.href = `../../projects/${projects[currentIndex - 1].id}/index.html`;
          }
        });
    }

    function navigateNext() {
      // Get all project IDs from data
      fetchJson('../../data/projects.json')
        .then(data => {
          const projects = data.projects;
          const currentId = getCurrentProjectId();
          const currentIndex = projects.findIndex(p => p.id === currentId);
          if (currentIndex < projects.length - 1) {
            window.location.href = `../../projects/${projects[currentIndex + 1].id}/index.html`;
          }
        });
    }

    loadProject();
    setupCursor();
  </script>
</body>
</html>
