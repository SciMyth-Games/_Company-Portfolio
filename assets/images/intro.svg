<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(0, 217, 255, 0.4)); }
        50% { filter: drop-shadow(0 0 20px rgba(0, 217, 255, 0.8)); }
      }
      .floating { animation: float 4s ease-in-out infinite; }
      .glowing { animation: glow 3s ease-in-out infinite; }
    </style>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#0a0e27" opacity="0.5"/>

  <!-- Glow effect -->
  <circle cx="250" cy="250" r="200" fill="url(#glow)"/>

  <!-- Game Controller -->
  <g class="floating glowing" transform="translate(250, 250)">
    <!-- Controller body -->
    <rect x="-80" y="-40" width="160" height="100" rx="20" fill="url(#purpleGradient)" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- Left D-pad -->
    <g transform="translate(-50, -15)">
      <circle cx="0" cy="0" r="8" fill="#1a1f3a" stroke="#00d9ff" stroke-width="1.5"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#00d9ff" stroke-width="1"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#00d9ff" stroke-width="1"/>
    </g>

    <!-- Right buttons -->
    <g transform="translate(50, -15)">
      <circle cx="0" cy="-8" r="5" fill="#ff00ff" stroke="#ff00ff" stroke-width="1"/>
      <circle cx="8" cy="0" r="5" fill="#00d9ff" stroke="#00d9ff" stroke-width="1"/>
      <circle cx="0" cy="8" r="5" fill="#00ff88" stroke="#00ff88" stroke-width="1"/>
      <circle cx="-8" cy="0" r="5" fill="#ffd700" stroke="#ffd700" stroke-width="1"/>
    </g>

    <!-- Center bar -->
    <rect x="-25" y="25" width="50" height="8" rx="4" fill="#00d9ff" stroke="#00d9ff" stroke-width="1"/>

    <!-- Shoulder buttons -->
    <rect x="-70" y="-50" width="30" height="8" rx="4" fill="#ff00ff" opacity="0.8"/>
    <rect x="40" y="-50" width="30" height="8" rx="4" fill="#ff00ff" opacity="0.8"/>
  </g>

  <!-- Decorative code symbols -->
  <g opacity="0.3" font-family="monospace" font-size="20" fill="#00d9ff">
    <text x="80" y="100">&lt;</text>
    <text x="350" y="120">/&gt;</text>
    <text x="100" y="400">{}</text>
    <text x="350" y="400">&lt;/&gt;</text>
  </g>

  <!-- Particles/Stars -->
  <g fill="#00d9ff" opacity="0.6">
    <circle cx="80" cy="80" r="2"/>
    <circle cx="420" cy="100" r="1.5"/>
    <circle cx="100" cy="350" r="2"/>
    <circle cx="450" cy="300" r="1.5"/>
    <circle cx="150" cy="150" r="1"/>
    <circle cx="380" cy="380" r="2"/>
  </g>

  <!-- Accent lines -->
  <g stroke="#ff00ff" stroke-width="1" opacity="0.4">
    <line x1="50" y1="50" x2="150" y2="50"/>
    <line x1="350" y1="450" x2="450" y2="450"/>
  </g>
</svg>

